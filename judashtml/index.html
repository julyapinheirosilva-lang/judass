<!DOCTYPE html>
<!-- 
    Calculadora de IMC em HTML/CSS/JavaScript
    Versão web responsiva com design moderno
-->
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <style>
        /* ====================== ESTILOS CSS ====================== */
        /* Reset básico de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilo do corpo: fundo gradiente e centralização */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container principal da calculadora */
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        /* Título principal */
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        /* Grupo de inputs para organização */
        .input-group {
            margin-bottom: 20px;
        }

        /* Estilos para labels */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        /* Estilos para campos de entrada */
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        /* Botão de cálculo */
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Efeito hover no botão */
        button:hover {
            background: #5a6fd8;
        }

        /* Área de resultado (inicialmente oculta) */
        #resultado {
            margin-top: 25px;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        /* Valor grande do IMC */
        .imc-valor {
            font-size: 48px;
            font-weight: bold;
            color: #333;
        }

        /* Texto da classificação */
        .classificacao {
            font-size: 22px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <!-- Container principal da aplicação -->
    <div class="container">
        <h1>Calculadora de IMC</h1>

        <!-- Grupo de input para Peso -->
        <div class="input-group">
            <!-- Input do peso -->
            <label for="peso">Peso (kg)</label>
            <input type="number" id="peso" placeholder="Ex: 75" step="0.1">
        </div>

        <!-- Grupo de input para Altura -->
        <div class="input-group">
            <!-- Input da altura em centímetros (mais comum no Brasil) -->
            <label for="altura">Altura (cm)</label>
            <input type="number" id="altura" placeholder="Ex: 175" step="0.1">
        </div>

        <!-- Botão de calcular -->
        <button onclick="calcularIMC()">Calcular IMC</button>

        <!-- Área do resultado (preenchida dinamicamente via JavaScript) -->
        <div id="resultado"></div>
    </div>

    <script>
        // ====================== JAVASCRIPT ======================
        
        // Função principal que calcula o IMC
        function calcularIMC() {
            // Pega os valores dos inputs
            const peso = parseFloat(document.getElementById('peso').value);
            const alturaCm = parseFloat(document.getElementById('altura').value);

            // Converte altura de cm para metros (fórmula padrão do IMC)
            const alturaM = alturaCm / 100;

            // Seleciona a div onde vai aparecer o resultado
            const resultadoDiv = document.getElementById('resultado');

            // Validação dos campos: verifica se são números válidos e positivos
            if (!peso || !alturaCm || peso <= 0 || alturaCm <= 0) {
                resultadoDiv.innerHTML = `
                    <p style="color: red; font-weight: bold;">
                        ⚠️ Por favor, preencha todos os campos corretamente.
                    </p>`;
                resultadoDiv.style.display = "block";
                return;
            }

            // Cálculo do IMC: peso / (altura em metros)^2
            const imc = (peso / (alturaM * alturaM)).toFixed(2);

            // Classificação do IMC conforme padrões da OMS com cores correspondentes
            let classificacao = "";
            let cor = "";

            if (imc < 18.5) {
                classificacao = "Abaixo do peso";
                cor = "#2196F3";
            } else if (imc < 25) {
                classificacao = "Peso normal";
                cor = "#4CAF50";
            } else if (imc < 30) {
                classificacao = "Sobrepeso";
                cor = "#FF9800";
            } else if (imc < 35) {
                classificacao = "Obesidade Grau I";
                cor = "#FF5722";
            } else if (imc < 40) {
                classificacao = "Obesidade Grau II";
                cor = "#F44336";
            } else {
                classificacao = "Obesidade Grau III (Mórbida)";
                cor = "#B71C1C";
            }

            // Exibe o resultado com estilo dinâmico (cor baseada na classificação)
            resultadoDiv.innerHTML = `
                <h2>Seu IMC é:</h2>
                <p class="imc-valor" style="color: ${cor}">${imc}</p>
                <p class="classificacao" style="color: ${cor}">${classificacao}</p>
            `;
            resultadoDiv.style.display = "block";
            resultadoDiv.style.border = `2px solid ${cor}`;
        }

        // Evento de teclado: permite calcular apertando a tecla ENTER
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                calcularIMC();
            }
        });
    </script>

</body>
</html>
